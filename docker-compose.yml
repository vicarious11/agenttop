services:
  agenttop:
    build: .
    ports:
      - "8420:8420"
    volumes:
      # Mount host AI tool data as read-only
      - ~/.claude:/data/.claude:ro
      - ~/.cursor:/data/.cursor:ro
      - ~/.config/github-copilot:/data/.copilot:ro
      # Persist optimizer cache across restarts
      - agenttop-data:/data/.agenttop
    environment:
      - CLAUDE_DIR=/data/.claude
      - CURSOR_DIR=/data/.cursor
      - AGENTTOP_DIR=/data/.agenttop
      # Uncomment for cloud LLM (faster optimizer):
      # - AGENTTOP_LLM_PROVIDER=anthropic
      # - AGENTTOP_LLM_MODEL=claude-haiku-4-5-20251001
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

volumes:
  agenttop-data:
